spring:
  application:
    name: tratic

  datasource:
    url: jdbc:postgresql://localhost:5432/tratic
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: create

  config:
    import: optional:file:.env[.properties]

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [ openid, email, profile ]

          kakao:
            client-name: Kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: [ openid, profile_nickname ]

        provider:
          kakao:
            issuer-uri: https://kauth.kakao.com

logging:
  level:
    root: INFO
    "[app.leesh.tratic]": DEBUG

  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{traceId:-}] [%thread] %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: false

clients:
  upbit:
    base-url: "https://api.upbit.com/v1"
    max-candle-count-per-request: 200
    fast-fail-wait-threshold: 3s
  binance:
    base-url: "https://fapi.binance.com"
    max-candles-per-call: 1500
    fast-fail-wait-threshold: 3s

analyze:
  fetch-candle-count: 256
  engine:
    defaults:
      epsilon: 1.0e-9
      trend-n: 20
      trend-fast-ema: 10
      trend-slow-ema: 30
      atr-floor-ratio: 0.1
      atr-floor-min: 1.0e-6
      volatility-atr-period: 20
      volatility-z-window: 30
      volatility-z-score-scale: 3.0
      volatility-high-threshold: 1.45
      volatility-low-threshold: 0.65
      location-window: 20
      atr-short-period: 14
      atr-long-period: 100
      minimum-extra-candles: 5
      pressure-volume-ema-period: 20
      pressure-view-ema-period: 5
      pressure-pos-close-weight: 0.6
      pressure-body-weight: 0.3
      pressure-wick-diff-weight: 0.1
      pressure-volume-weight-min: 0.5
      pressure-volume-weight-max: 1.5
    by-resolution: {}
